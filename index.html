<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="bg-red-400 text-white">

    <div style="width: 100%;" class="cont text-center my-12">
      <h2 class="text-xl md:text-5xl font-bold mb-5">Word counter</h2>

      <textarea
        id="message"
        maxlength="150"
        placeholder="Type your message..."
        class="text-black rounded-md px-5 pt-5 text-lg text-blue-700"
        style="width: 60%; height: 50vh;"
      ></textarea>

      <div class="counter" id="counter">0 / 150 characters</div>
      <div class="remaining">150 characters</div>

      <h1 class="md:mx-2 text-xl md:text-5xl text-center font-bold mt-4">Click back on the browser to enter into <span class="text-red-600">PROJECT 1</span></h1>
    </div>

    <script src="script.js"></script>
  </body>
</html>
